    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <script type="text/babel">
        console.log('%c=== Profile Card with Hover Effects Demo Starting ===', 'color: green; font-size: 14px; font-weight: bold');
        
        // Simple synchronous React initialization
        setTimeout(() => {
            try {
                console.log('Checking React availability...');
                console.log('window.React:', typeof window.React);
                console.log('window.ReactDOM:', typeof window.ReactDOM);
                
                if (!window.React) {
                    throw new Error('React not loaded');
                }
                if (!window.ReactDOM) {
                    throw new Error('ReactDOM not loaded');
                }
                if (!window.React.createElement) {
                    throw new Error('React.createElement not available');
                }
                
                const React = window.React;
                const ReactDOM = window.ReactDOM;
                const { useState, useEffect, useReducer, useContext, useRef, useCallback, useMemo } = React;
                
                console.log('✓ React loaded successfully');
                console.log('Defining components...');
                
                
// ProfileCard Component



const ProfileCard = ({ name, bio, profilePicture, backgroundColor }) => {

    const inlineStyles = {
        backgroundColor: backgroundColor || '#f0f0f0',
        textAlign: 'center',
        padding: '20px',
        borderRadius: '8px',
        boxShadow: '0 4px 6px rgba(0, 0, 0, 0.1)',
        transition: 'background-color 0.3s ease',
    };

    const [isHovered, setIsHovered] = useState(false);

    const hoverStyles = {
        backgroundColor: isHovered ? '#e0e0e0' : inlineStyles.backgroundColor,
    };

    const handleMouseEnter = () => setIsHovered(true);
    const handleMouseLeave = () => setIsHovered(false);

    return (
        <div
            className="profile-card"
            style={{ ...inlineStyles, ...hoverStyles }}
            onMouseEnter={handleMouseEnter}
            onMouseLeave={handleMouseLeave}
        >
            <img src={profilePicture} alt="Profile" className="profile-image" />
            <h2>{name}</h2>
            <p>{bio}</p>
        </div>
    );
};



                

function App() {
  return (
    <div className="App">
      <h1 style={{ textAlign: 'center', marginTop: '20px' }}>User Profile</h1>
      <ProfileCard
        name="John Doe"
        bio="A passionate developer with a love for learning and coding."
        profilePicture="https://upload.wikimedia.org/wikipedia/commons/4/45/John_Healey_Official_Cabinet_Portrait%2C_July_2024_%28cropped%29_2.jpg"
        backgroundColor="pink"
      />
    </div>
  );
}

                
                console.log('✓ Components defined');
                console.log('Rendering to DOM...');
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('Root element not found');
                }
                
                try {
                    // Try React 18 API first
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(React.createElement(App));
                } catch (e) {
                    // Fallback to React 16/17 API
                    console.log('Using legacy render method...');
                    ReactDOM.render(React.createElement(App), rootElement);
                }
                
                console.log('✓ App rendered successfully');
            } catch (error) {
                console.error('DEMO ERROR:', error);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<div style="color: red; padding: 30px; font-family: monospace; font-size: 14px; line-height: 1.5;"><h2>Error:</h2><pre>' + (error.stack || error.message) + '</pre></div>';
                }
            }
        }, 500); // Give React 500ms to load
    </script>
