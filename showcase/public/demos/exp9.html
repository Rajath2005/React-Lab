<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page Navigation with React Router - Live Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #root {
            width: 100%;
            max-width: 100%;
        }
        
        .App {
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
    sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

nav {
  background-color: #333;
  padding: 15px;
  margin-bottom: 30px;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

nav a {
  color: white;
  text-decoration: none;
  padding: 8px 15px;
  margin: 0 5px;
  border-radius: 4px;
  transition: background 0.3s;
  font-weight: 500;
}

nav a:hover {
  background-color: #667eea;
}

nav a.active {
  background-color: #667eea;
  text-decoration: underline;
}

h1, h2 {
  color: white;
  margin-top: 40px;
  font-size: 2.5rem;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

p {
  color: #f0f0f0;
  font-size: 18px;
  line-height: 1.6;
  max-width: 600px;
  margin: 20px auto;
}

@keyframes App-logo-spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

    </style>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <script type="text/babel">
        console.log('%c=== Multi-Page Navigation with React Router Demo Starting ===', 'color: green; font-size: 14px; font-weight: bold');
        
        // Simple synchronous React initialization
        setTimeout(() => {
            try {
                console.log('Checking React availability...');
                console.log('window.React:', typeof window.React);
                console.log('window.ReactDOM:', typeof window.ReactDOM);
                
                if (!window.React) {
                    throw new Error('React not loaded');
                }
                if (!window.ReactDOM) {
                    throw new Error('ReactDOM not loaded');
                }
                if (!window.React.createElement) {
                    throw new Error('React.createElement not available');
                }
                
                const React = window.React;
                const ReactDOM = window.ReactDOM;
                const { useState, useEffect, useReducer, useContext, useRef, useCallback, useMemo } = React;
                
                console.log('✓ React loaded successfully');
                console.log('Defining components...');
                
                
// About Component


const About = () => {
  return (
    <div>
      <h1>About Us</h1>
      <p>Learn about React Router and how it enables client-side routing in single-page applications.</p>
      <p>React Router allows you to build dynamic navigation without page reloads.</p>
    </div>
  );
};



// Contact Component


const Contact = () => {
  return (
    <div>
      <h1>Contact Us</h1>
      <p>Get in touch with us through any of our contact methods.</p>
      <p>We're here to help and answer any questions about React and web development.</p>
    </div>
  );
};



// Home Component


const Home = () => {
  return (
    <div>
      <h1>Welcome to React Router</h1>
      <p>This is a multi-page application built with React Router v6.</p>
      <p>Navigate using the links above to explore different pages.</p>
    </div>
  );
};



// Navbar Component



const Navbar = () => {
  return (
    <nav>
      <NavLink to="/">Home</NavLink> |{" "}
      <NavLink to="/about">About</NavLink> |{" "}
      <NavLink to="/contact">Contact</NavLink>
    </nav>
  );
};



                

const App = () => {
  return (
    <Router>
      <Navbar />

      <Routes>
        <Route path="/" element={<Home />} />
        <Route path="/about" element={<About />} />
        <Route path="/contact" element={<Contact />} />
      </Routes>

    </Router>
  );
};


                
                console.log('✓ Components defined');
                console.log('Rendering to DOM...');
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('Root element not found');
                }
                
                try {
                    // Try React 18 API first
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(React.createElement(App));
                } catch (e) {
                    // Fallback to React 16/17 API
                    console.log('Using legacy render method...');
                    ReactDOM.render(React.createElement(App), rootElement);
                }
                
                console.log('✓ App rendered successfully');
            } catch (error) {
                console.error('DEMO ERROR:', error);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<div style="color: red; padding: 30px; font-family: monospace; font-size: 14px; line-height: 1.5;"><h2>Error:</h2><pre>' + (error.stack || error.message) + '</pre></div>';
                }
            }
        }, 500); // Give React 500ms to load
    </script>
</body>
</html>
