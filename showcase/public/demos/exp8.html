<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Reminder with Filtering - Live Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #root {
            width: 100%;
            max-width: 100%;
        }
        
        .App {
  text-align: center;
}

.App-logo {
  height: 40vmin;
  pointer-events: none;
}

@media (prefers-reduced-motion: no-preference) {
  .App-logo {
    animation: App-logo-spin infinite 20s linear;
  }
}

.App-header {
  background-color: #282c34;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: calc(10px + 2vmin);
  color: white;
}

.App-link {
  color: #61dafb;
}

@keyframes App-logo-spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

    </style>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <script type="text/babel">
        console.log('%c=== Task Reminder with Filtering Demo Starting ===', 'color: green; font-size: 14px; font-weight: bold');
        
        // Simple synchronous React initialization
        setTimeout(() => {
            try {
                console.log('Checking React availability...');
                console.log('window.React:', typeof window.React);
                console.log('window.ReactDOM:', typeof window.ReactDOM);
                
                if (!window.React) {
                    throw new Error('React not loaded');
                }
                if (!window.ReactDOM) {
                    throw new Error('ReactDOM not loaded');
                }
                if (!window.React.createElement) {
                    throw new Error('React.createElement not available');
                }
                
                const React = window.React;
                const ReactDOM = window.ReactDOM;
                const { useState, useEffect, useReducer, useContext, useRef, useCallback, useMemo } = React;
                
                console.log('✓ React loaded successfully');
                console.log('Defining components...');
                
                
// Reminder Component



function Reminder() {
    const [tasks, setTasks] = useState([]);
    const [task, setTask] = useState({ name: "", due: "", desc: "" });
    const [filter, setFilter] = useState("all");

    const addTask = () => {
        if (!task.name || !task.due) return;
        setTasks([...tasks, { ...task, id: Date.now(), completed: false }]);
        setTask({ name: "", due: "", desc: "" });
    };

    const toggleCompletion = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
    };

    const filteredTasks = tasks.filter(t =>
        filter === "all" ? true : filter === "completed" ? t.completed : !t.completed
    );

    return (
        <div className="container">
            <h2>Add New Task</h2>
            <input placeholder="Task Name" value={task.name} onChange={e => setTask({ ...task, name: e.target.value })} />
            <input type="date" value={task.due} onChange={e => setTask({ ...task, due: e.target.value })} />
            <textarea placeholder="Description (optional)" value={task.desc} onChange={e => setTask({ ...task, desc: e.target.value })} />
            <button onClick={addTask}>Add Task</button>

            <h3>Filter</h3>
            <select value={filter} onChange={e => setFilter(e.target.value)}>
                <option value="all">All Tasks</option>
                <option value="completed">Completed Tasks</option>
                <option value="pending">Pending Tasks</option>
            </select>

            <ul>
                {filteredTasks.map(t => (
                    <li key={t.id} className={`task-item ${t.completed ? "completed" : "pending"}`}>
                        <div className="task-header">
                            <strong>{t.name}</strong>
                            <button onClick={() => toggleCompletion(t.id)}>
                                {t.completed ? "Mark as Pending" : "Mark as Completed"}
                            </button>
                        </div>
                        <div><strong>Due:</strong> {t.due}</div>
                        {t.desc && <div><strong>Note:</strong> {t.desc}</div>}
                        <div className="status-label">Status: {t.completed ? "Completed" : "Pending"}</div>
                    </li>
                ))}
                {filteredTasks.length === 0 && <p className="no-tasks">No tasks to display</p>}
            </ul>
        </div>
    );
}


                

function App() {
  return (
    <div>
      <Reminder />
    </div>
  );
}

                
                console.log('✓ Components defined');
                console.log('Rendering to DOM...');
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('Root element not found');
                }
                
                try {
                    // Try React 18 API first
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(React.createElement(App));
                } catch (e) {
                    // Fallback to React 16/17 API
                    console.log('Using legacy render method...');
                    ReactDOM.render(React.createElement(App), rootElement);
                }
                
                console.log('✓ App rendered successfully');
            } catch (error) {
                console.error('DEMO ERROR:', error);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<div style="color: red; padding: 30px; font-family: monospace; font-size: 14px; line-height: 1.5;"><h2>Error:</h2><pre>' + (error.stack || error.message) + '</pre></div>';
                }
            }
        }, 500); // Give React 500ms to load
    </script>
</body>
</html>
