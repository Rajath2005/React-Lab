<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Application - Live Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #root {
            width: 100%;
            max-width: 100%;
        }
        
        .Todo-Container {
  text-align: center;
  padding: 20px;
}

input {
  padding: 10px;
  margin-right: 10px;
}

button {
  padding: 10px;
  cursor: pointer;
}

ul {
  list-style-type: none;
  padding: 0;
}

li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
}

.completed {
  text-decoration: line-through;
}
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <script type="text/babel">
        console.log('%c=== Todo List Application Demo Starting ===', 'color: green; font-size: 14px; font-weight: bold');
        
        // Simple synchronous React initialization
        setTimeout(() => {
            try {
                console.log('Checking React availability...');
                console.log('window.React:', typeof window.React);
                console.log('window.ReactDOM:', typeof window.ReactDOM);
                
                if (!window.React) {
                    throw new Error('React not loaded');
                }
                if (!window.ReactDOM) {
                    throw new Error('ReactDOM not loaded');
                }
                if (!window.React.createElement) {
                    throw new Error('React.createElement not available');
                }
                
                const React = window.React;
                const ReactDOM = window.ReactDOM;
                const { useState, useEffect, useReducer, useContext, useRef, useCallback, useMemo } = React;
                
                console.log('✓ React loaded successfully');
                console.log('Defining components...');
                
                
                

function TodoFunction() {
  const [tasks, setTasks] = useState([]);
  const [newtask, setNewTask] = useState('');

  const addTask = () => {
    if (newtask.trim() === '') return;
    const task = {
      id: Date.now(),
      text: newtask,
      completed: false,
    };
    setTasks([...tasks, task]);
    setNewTask('');

  };
  const toggleCompletion = (taskId) => {
    setTasks(
      tasks.map((task) =>
        task.id === taskId ? { ...task, completed: !task.completed } : task
      )
    );
  }
  const deleteTask = (taskId) => {
    setTasks(tasks.filter((task) => task.id !== taskId));
  }

  return (
    <div className="Todo-Container">
      <h1>Todo-App</h1>
      <div>
        <input type="text" value={newtask} onChange={(e) => setNewTask(e.target.value)} placeholder='Add a new Task'></input>
        <button onClick={addTask}>Add Task</button>
      </div>
      <ul>
        {tasks.map((task) => (
          <li key={task.id} className={task.completed ? 'completed' : ''}>
            <span style={{ textDecoration: task.completed ? 'line-through' : 'none' }} onClick={() => toggleCompletion(task.id)}>{task.text}</span>

            <button onClick={()=>deleteTask(task.id)}>Delete</button>
          </li>
        ))}
      </ul>-

    </div>
  );

};

function App() {
  return (
    <div className='App'>
      <TodoFunction />
    </div>
  );
}

                
                console.log('✓ Components defined');
                console.log('Rendering to DOM...');
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('Root element not found');
                }
                
                try {
                    // Try React 18 API first
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(React.createElement(App));
                } catch (e) {
                    // Fallback to React 16/17 API
                    console.log('Using legacy render method...');
                    ReactDOM.render(React.createElement(App), rootElement);
                }
                
                console.log('✓ App rendered successfully');
            } catch (error) {
                console.error('DEMO ERROR:', error);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<div style="color: red; padding: 30px; font-family: monospace; font-size: 14px; line-height: 1.5;"><h2>Error:</h2><pre>' + (error.stack || error.message) + '</pre></div>';
                }
            }
        }, 500); // Give React 500ms to load
    </script>
</body>
</html>
