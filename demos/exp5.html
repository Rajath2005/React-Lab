<!DOCTYPE html>

    <title>Image Gallery with Add/Remove - Live Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #root {
            width: 100%;
            max-width: 100%;
        }
        
        .App { 
font-family: Arial, sans-serif; 
text-align: center; 
padding: 20px; 
} 
.figure-list .form { 
margin-bottom: 20px; 
} 
.figure-list .form input { 
margin: 5px; 
padding: 8px; 
width: 200px; 
border: 1px solid #ccc; 
border-radius: 5px; 
} 
.figure-list .form button { 
padding: 8px 12px; 
background-color: #4caf50; 
color: white; 
border: none; 
border-radius: 5px; 
cursor: pointer; 
} 
.figure-list .form button:hover { 
background-color: #45a049; 
} 
.grid { 
display: grid; 
grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
gap: 20px; 
} 
.basic-figure { 
position: relative; 
background: #f9f9f9; 
padding: 10px; 
border-radius: 10px; 
box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); 
text-align: center; 
} 
.figure-image { 
max-width: 100%; 
border-radius: 8px; 
transition: transform 0.3s ease; 
} 
.figure-image:hover { 
transform: scale(1.05); 
} 
.figure-caption { 
margin-top: 10px; 
font-size: 14px; 
color: #555; 
} 
.remove-button { 
position: absolute; 
top: 5px; 
right: 5px; 
padding: 5px; 
background-color: #e74c3c; 
color: white; 
border: none; 
border-radius: 50%; 
cursor: pointer; 
} 
.remove-button:hover { 
background-color: #c0392b; 
}
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <script type="text/babel">
        console.log('%c=== Image Gallery with Add/Remove Demo Starting ===', 'color: green; font-size: 14px; font-weight: bold');
        
        // Simple synchronous React initialization
        setTimeout(() => {
            try {
                console.log('Checking React availability...');
                console.log('window.React:', typeof window.React);
                console.log('window.ReactDOM:', typeof window.ReactDOM);
                
                if (!window.React) {
                    throw new Error('React not loaded');
                }
                if (!window.ReactDOM) {
                    throw new Error('ReactDOM not loaded');
                }
                if (!window.React.createElement) {
                    throw new Error('React.createElement not available');
                }
                
                const React = window.React;
                const ReactDOM = window.ReactDOM;
                const { useState, useEffect, useReducer, useContext, useRef, useCallback, useMemo } = React;
                
                console.log('✓ React loaded successfully');
                console.log('Defining components...');
                
                
// FigureList Component


const BasicFigure = ({ image, caption, onRemove }) => {
    return (
        <div className='basic-figure'>
            <img src={image} alt={caption} className='figure-image'></img>
            <figcaption className='remove-button' onClick={onRemove}>Remove</figcaption>
        </div>

    );
}

const FigureList = () => {
    const [figures, setFigures] = useState([
        {
            id: 1,
            image: "https://via.placeholder.com/150",
            caption: "Natural Image 1",
        },
        {
            id: 2,
            image: "https://via.placeholder.com/150",
            caption: "Natural Image 2",
        },
    ]);

    const [newImage, setNewImage] = useState('');
    const [newCaption, setNewCaption] = useState('');
    const addfigure = () => {
        if (newImage && newCaption) {
            setFigures([...figures,
            {
                id: Date.now(),
                image: newImage,
                caption: newCaption,
            }
            ])
                setNewImage('');
    setNewCaption('');
        }
    }


    const removeFigure = (id) => {
        setFigures(figures.filter((figure) => figure.id !== id));
    };

    return (
        <div className='figure-list'>
            <div className='form'>
                <input type="text" placeholder='Image-url' value={newImage} onChange={(e) => setNewImage(e.target.value)}></input>
                <input type="text" placeholder='Caption' value={newCaption} onChange={(e) => setNewCaption(e.target.value)}></input>
                <button onClick={addfigure}>Add a Image</button>

            </div>
            <div className='grid'>
                {figures.map((figure) => (
                    <BasicFigure
                        key={figure.id}
                        image={figure.image}
                        caption={figure.caption}
                        onRemove={()=>removeFigure(figure.id)}
                    />
                ))}
            </div>
        </div>

    );
}


                

function App(){
  return(
    <div className='App'>
      <h1>FigureList</h1>
      <FigureList/>
    </div>
  );
}

                console.log('Rendering to DOM...');
                
                const rootElement = document.getElementById('root');
                if (!rootElement) {
                    throw new Error('Root element not found');
                }
                
                try {
                    // Try React 18 API first
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(React.createElement(App));
                } catch (e) {
                    // Fallback to React 16/17 API
                    console.log('Using legacy render method...');
                    ReactDOM.render(React.createElement(App), rootElement);
                }
                
                console.log('✓ App rendered successfully');
            } catch (error) {
                console.error('DEMO ERROR:', error);
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<div style="color: red; padding: 30px; font-family: monospace; font-size: 14px; line-height: 1.5;"><h2>Error:</h2><pre>' + (error.stack || error.message) + '</pre></div>';
                }
            }
        }, 500); // Give React 500ms to load
    </script>

</html>
